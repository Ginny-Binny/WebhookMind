server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static assets (long-cached)
    location ~* \.(?:css|js|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SolidJS SPA — every unmatched path returns index.html so client routing works.
    location / {
        try_files $uri /index.html;
    }

    # REST API
    location /api/ {
        proxy_pass http://api:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Webhook ingestion — needed so the dashboard's "Try it" panel can POST
    # to its own origin without CORS gymnastics. In production behind the host
    # nginx, /webhook/* is intercepted before reaching this server, so this
    # block only matters when the dashboard is the public face (local dev,
    # `docker compose up` without an outer reverse proxy).
    location /webhook/ {
        proxy_pass http://ingestion:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10M;
    }

    # Server-Sent Events — disable buffering and run forever.
    location /events {
        proxy_pass http://sse:8081/events;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
        chunked_transfer_encoding on;
    }
}
